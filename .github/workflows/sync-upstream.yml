name: Sync upstream
on:
  schedule:
    - cron: '47 9 * * *'   # daily, 30 min after the opendbc fork syncs
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: tiguan-mk3
          fetch-depth: 0

      - name: Merge upstream master into tiguan-mk3
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/infiniteCable2/openpilot.git
          git fetch upstream master

          # merge without committing; submodule pointer + .gitmodules conflicts are expected and resolved below
          git merge upstream/master --no-commit || true

          # keep OUR .gitmodules (opendbc points at NotHassan/opendbc)
          git checkout --ours .gitmodules 2>/dev/null || true
          git add .gitmodules

          # always pin opendbc_repo to the head of our synced opendbc branch
          DBSHA=$(git ls-remote https://github.com/NotHassan/opendbc.git refs/heads/tiguan-mk3 | cut -f1)
          git update-index --cacheinfo 160000,"$DBSHA",opendbc_repo

          # any OTHER unresolved conflict is a real one -> fail so the owner gets notified
          if git diff --name-only --diff-filter=U | grep -vE '^(opendbc_repo|\.gitmodules)$' | grep -q .; then
            echo "::error::Real merge conflicts need manual resolution:"
            git diff --name-only --diff-filter=U
            exit 1
          fi

          if git diff --cached --quiet && git diff --quiet; then
            echo "Already up to date."
          else
            git commit -m "Merge upstream infiniteCable2/openpilot master (opendbc_repo -> NotHassan/opendbc tiguan-mk3 @ ${DBSHA:0:9})" || true
            git push origin tiguan-mk3
          fi
